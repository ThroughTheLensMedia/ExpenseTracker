name: expense-tracker

services:
  expense_api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: expense_api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_PATH: /data/db/expenses.sqlite
      RECEIPT_DIR: /data/receipts
    volumes:
      - ./data/db:/data/db
      - ./data/receipts:/data/receipts
    ports:
      - "3000" # <-- internal port only
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 15

  expense_web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: expense_web
    restart: unless-stopped
    depends_on:
      expense_api:
        condition: service_healthy

  expense_tunnel:
    image: cloudflare/cloudflared:2026.2.0
    container_name: expense_tunnel
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      expense_web:
        condition: service_started
    command: >
      tunnel run --token ${CF_TUNNEL_TOKEN}
